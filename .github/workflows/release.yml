name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'

permissions:
  contents: write
  packages: write
  id-token: write  # required for cosign keyless signing via OIDC
  attestations: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      # rust-toolchain.toml pins 1.89.0. Install that exact version plus the
      # cross-compile target, otherwise rust-std for the target is missing
      # when cargo reads the pinned channel and E0463 fires.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bins

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          staging="honeymcp-${version}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp LICENSE README.md CHANGELOG.md "$staging/"
          for bin in honeymcp honeymcp-probes; do
            if [[ -f "target/${{ matrix.target }}/release/${bin}" ]]; then
              cp "target/${{ matrix.target }}/release/${bin}" "$staging/"
            fi
          done
          tar czf "${staging}.tar.gz" "$staging"
          shasum -a 256 "${staging}.tar.gz" > "${staging}.tar.gz.sha256"
          echo "ASSET=${staging}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SHA=${staging}.tar.gz.sha256" >> $GITHUB_ENV

      - name: Package (zip, windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $staging = "honeymcp-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item LICENSE, README.md, CHANGELOG.md $staging
          foreach ($bin in @('honeymcp.exe','honeymcp-probes.exe')) {
            $src = "target/${{ matrix.target }}/release/$bin"
            if (Test-Path $src) { Copy-Item $src $staging }
          }
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          $hash = (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $staging.zip" | Out-File -Encoding ASCII "$staging.zip.sha256"
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$staging.zip"
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET_SHA=$staging.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: honeymcp-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          if-no-files-found: error
          retention-days: 7

  container:
    name: container image (GHCR + cosign)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Multi-arch via QEMU takes ~30+ min because the Rust release build runs
      # under arm64 emulation. Keep rc.* releases amd64-only so the cosign +
      # SBOM smoke signal arrives in minutes, then re-enable linux/arm64 once
      # the Dockerfile cross-compiles properly (rust:1.89-slim matches the
      # rust-toolchain.toml pin, avoids the rustup-inside-container hit).
      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX + CycloneDX)
        env:
          REF: ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${REF}" -o spdx-json > honeymcp.spdx.json
          syft "${REF}" -o cyclonedx-json > honeymcp.cdx.json

      - name: Attest SBOM to the image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            cosign attest --yes \
              --predicate honeymcp.spdx.json \
              --type spdxjson \
              "${tag}@${DIGEST}"
          done

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            honeymcp.spdx.json
            honeymcp.cdx.json
          retention-days: 90

  publish:
    name: publish github release
    runs-on: ubuntu-latest
    needs: [build, container]
    steps:
      - uses: actions/checkout@v6

      # Bulk `download-artifact@v4` against many artifacts is flaky on the
      # parallel blob-storage fetch; switch to per-artifact pulls with
      # merge-multiple so each download is its own retry domain.
      #
      # NOTE: build job uploads artifacts with name "honeymcp-<target>"
      # (see line ~109 above), NOT "binary-<target>" -- a mismatched
      # pattern here silently downloaded nothing and left the release
      # missing binaries.
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: honeymcp-*
          merge-multiple: true

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          path: dist
          name: sbom

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v v="${version}" '
            $0 ~ ("^## \\[" v "\\]") { on=1; print; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > release-notes.md || true
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          files: |
            dist/honeymcp-*.tar.gz
            dist/honeymcp-*.tar.gz.sha256
            dist/honeymcp-*.zip
            dist/honeymcp-*.zip.sha256
            dist/honeymcp.spdx.json
            dist/honeymcp.cdx.json
          fail_on_unmatched_files: false
