<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>honeymcp / live</title>
<style>
  :root {
    --bg: #0b0d10;
    --fg: #d7dde3;
    --dim: #6b7280;
    --accent: #f5c518;
    --crit: #ef4444;
    --high: #f97316;
    --med: #eab308;
    --low: #22c55e;
    --border: #1f2937;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
               font-size: 13px; line-height: 1.55; }
  body { padding: 24px; max-width: 960px; margin: 0 auto; }
  header { display: flex; align-items: baseline; justify-content: space-between;
           border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 18px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: 0.02em; }
  header h1 span.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                      background: var(--low); margin-right: 6px; vertical-align: 1px;
                      box-shadow: 0 0 6px var(--low); }
  header small { color: var(--dim); }
  section { margin-bottom: 24px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em;
       color: var(--dim); font-weight: 600; margin: 0 0 8px 0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card { border: 1px solid var(--border); padding: 12px 14px; border-radius: 6px; }
  .card .n { font-size: 22px; font-weight: 600; color: var(--accent); display: block; }
  .card .k { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
  table td.v { color: var(--accent); text-align: right; font-variant-numeric: tabular-nums; }
  .severity-critical { color: var(--crit); }
  .severity-high { color: var(--high); }
  .severity-medium { color: var(--med); }
  .severity-low { color: var(--low); }
  footer { color: var(--dim); font-size: 11px; margin-top: 32px;
           border-top: 1px solid var(--border); padding-top: 10px; }
  footer a { color: var(--dim); }
  .err { color: var(--crit); }
  .muted { color: var(--dim); }
  .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 640px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .cols-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1><span class="dot" id="statusDot"></span><span id="serverName">honeymcp</span> <span class="muted" id="serverVersion"></span></h1>
  <small>autorefresh 5s - <span id="lastUpdate">-</span></small>
</header>

<section>
  <h2>counters</h2>
  <div class="grid">
    <div class="card"><span class="n" id="events">-</span><span class="k">events</span></div>
    <div class="card"><span class="n" id="detections">-</span><span class="k">detections</span></div>
    <div class="card"><span class="n" id="remotes">-</span><span class="k">unique addrs 24h</span></div>
    <div class="card"><span class="n" id="uptime">-</span><span class="k">uptime</span></div>
  </div>
</section>

<div class="cols-2">
  <section>
    <h2>events by method</h2>
    <table id="tblMethods"><tbody></tbody></table>
  </section>
  <section>
    <h2>top tools (tools/call)</h2>
    <table id="tblTools"><tbody></tbody></table>
  </section>
</div>

<section>
  <h2>detections by category</h2>
  <table id="tblDetections"><tbody></tbody></table>
</section>

<footer>
  <a href="https://github.com/kosiorkosa47/honeymcp" target="_blank">github.com/kosiorkosa47/honeymcp</a>
  - Apache-2.0 - live telemetry
</footer>

<script>
  const $ = (id) => document.getElementById(id);
  function fmtUptime(sec) {
    if (sec < 60) return sec + "s";
    const m = Math.floor(sec / 60);
    if (m < 60) return m + "m " + (sec % 60) + "s";
    const h = Math.floor(m / 60);
    if (h < 48) return h + "h " + (m % 60) + "m";
    return Math.floor(h / 24) + "d " + (h % 24) + "h";
  }
  function rowsFromPairs(pairs, sevFor) {
    if (!pairs || pairs.length === 0) return '<tr><td colspan="2" class="muted">(no data yet)</td></tr>';
    return pairs.map(([k, v]) => {
      const cls = sevFor ? (' class="severity-' + k + '"') : '';
      return '<tr><td' + cls + '>' + k + '</td><td class="v">' + v + '</td></tr>';
    }).join('');
  }
  async function refresh() {
    try {
      const r = await fetch('/stats', {cache: 'no-store'});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const s = await r.json();
      $('serverName').textContent = s.server.name;
      $('serverVersion').textContent = 'v' + s.server.version + ' / proto ' + s.server.protocol_version;
      $('events').textContent = s.total_events;
      $('detections').textContent = s.total_detections;
      $('remotes').textContent = s.unique_remote_addrs_24h;
      $('uptime').textContent = fmtUptime(s.uptime_seconds);
      $('tblMethods').querySelector('tbody').innerHTML = rowsFromPairs(s.events_by_method);
      $('tblTools').querySelector('tbody').innerHTML = rowsFromPairs(s.top_tools);
      $('tblDetections').querySelector('tbody').innerHTML = rowsFromPairs(s.detections_by_category, true);
      $('lastUpdate').textContent = new Date().toISOString().replace('T', ' ').slice(0, 19) + 'Z';
      $('statusDot').style.background = 'var(--low)';
      $('statusDot').style.boxShadow = '0 0 6px var(--low)';
    } catch (e) {
      $('lastUpdate').innerHTML = '<span class="err">stats unavailable: ' + e.message + '</span>';
      $('statusDot').style.background = 'var(--crit)';
      $('statusDot').style.boxShadow = '0 0 6px var(--crit)';
    }
  }
  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
